<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPO認知特性診断</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --text: #e8eaf6;
    --text-muted: #7986a8;
    --accent-i: #4fc3f7;
    --accent-p: #a5d6a7;
    --accent-o: #ffcc80;
    --accent-opi: #ce93d8;
    --accent-warn: #ef9a9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* プログレス */
  .progress-wrap {
    margin-bottom: 24px;
  }
  .progress-bar-bg {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-i), var(--accent-p));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  /* 質問 */
  .question-box { display: none; }
  .question-box.active { display: block; animation: fadeIn 0.25s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 20px;
    color: var(--text);
  }

  .btn-list { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    width: 100%;
  }
  .choice-btn:hover {
    background: var(--surface2);
    border-color: #4a5080;
    transform: translateX(2px);
  }
  .choice-label {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* 結果 */
  #result-view { display: none; animation: fadeIn 0.3s ease; }

  .result-top {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    margin-bottom: 16px;
    text-align: center;
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .result-type {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }
  .badge-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-ipo { background: rgba(79,195,247,0.15); color: var(--accent-i); border: 1px solid rgba(79,195,247,0.3); }
  .badge-w   { background: rgba(165,214,167,0.15); color: var(--accent-p); border: 1px solid rgba(165,214,167,0.3); }
  .badge-n   { background: rgba(255,204,128,0.15); color: var(--accent-o); border: 1px solid rgba(255,204,128,0.3); }

  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 12px;
  }
  .result-section h3 {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .result-section p {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-line;
  }

  .debug-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .debug-section h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .debug-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .debug-row:last-child { border-bottom: none; }
  .debug-val { color: var(--text); font-weight: 600; }

  .choice-btn.selected {
    background: var(--surface2);
    border-color: var(--accent-p);
    color: var(--accent-p);
  }
  .choice-btn.selected .choice-label {
    color: var(--accent-p);
  }

  .back-btn {
    margin-top: 14px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
    display: block;
  }
  .score-bars { display: flex; flex-direction: column; gap: 12px; }
  .score-row { display: flex; align-items: center; gap: 10px; }
  .score-label { font-size: 12px; color: var(--text-muted); width: 100px; flex-shrink: 0; }
  .score-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; width: 0; transition: width 0.6s ease; }
  .fill-i { background: var(--accent-i); }
  .fill-p { background: var(--accent-p); }
  .fill-o { background: var(--accent-o); }
  .score-num { font-size: 13px; font-weight: 700; color: var(--text); width: 28px; text-align: right; flex-shrink: 0; }

  .reset-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: #2a2f4a; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">IPO Cognitive Model</div>
    <h1>認知特性診断</h1>
    <p>あなたの認知の「起点」「注意配分」「分解能」を診断します。<br>全10問、直感で選んでください。</p>
  </div>

  <div id="quiz-view">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:10%"></div></div>
      <div class="progress-text" id="progress-text">1 / 10</div>
    </div>
    <div id="questions-container"></div>
  </div>

  <div id="result-view">
    <div class="result-top">
      <div class="result-label">診断結果</div>
      <div class="result-type" id="res-type-name">—</div>
      <div class="badge-row">
        <span class="badge badge-ipo" id="badge-vector">—</span>
        <span class="badge badge-w" id="badge-weight">—</span>
        <span class="badge badge-n" id="badge-res">—</span>
      </div>
    </div>
    <div class="result-section">
      <h3>特徴</h3>
      <p id="res-description">—</p>
    </div>
    <div class="result-section">
      <h3>強み</h3>
      <p id="res-strength">—</p>
    </div>
    <div class="result-section">
      <h3>注意点</h3>
      <p id="res-caution">—</p>
    </div>
    <div class="result-section">
      <h3>IPO得点配分</h3>
      <div class="score-bars">
        <div class="score-row">
          <span class="score-label">I（情報志向）</span>
          <div class="score-bar-bg"><div class="score-bar-fill fill-i" id="bar-i"></div></div>
          <span class="score-num" id="num-i">—</span>
        </div>
        <div class="score-row">
          <span class="score-label">P（構造志向）</span>
          <div class="score-bar-bg"><div class="score-bar-fill fill-p" id="bar-p"></div></div>
          <span class="score-num" id="num-p">—</span>
        </div>
        <div class="score-row">
          <span class="score-label">O（成果志向）</span>
          <div class="score-bar-bg"><div class="score-bar-fill fill-o" id="bar-o"></div></div>
          <span class="score-num" id="num-o">—</span>
        </div>
      </div>
    </div>
    <div class="debug-section">
      <h3>デバッグログ</h3>
      <div class="debug-row"><span>ベクトルの向き</span><span class="debug-val" id="dbg-vector">—</span></div>
      <div class="debug-row"><span>注意配分 W</span><span class="debug-val" id="dbg-weight">—</span></div>
      <div class="debug-row"><span>分解能 n</span><span class="debug-val" id="dbg-res">—</span></div>
      <div class="debug-row"><span>OPIスコア</span><span class="debug-val" id="dbg-opi">—</span></div>
    </div>
    <button class="reset-btn" onclick="location.reload()">もう一度診断する</button>
  </div>

</div>

<script>
const questions = [
  {
    title: "Q1. 何か新しいことに取り組むとき、最初に頭に浮かぶのは？",
    a: "「まず状況を正確に把握しよう」「関連する情報を集めよう」という思考",
    b: "「最終的にどうなっていれば成功か」「ゴールはどこか」というイメージ",
    c: "理由より先に「こうしたい」「こうあるべき」という強いビジョンや衝動"
  },
  {
    title: "Q2. 仕事や勉強で「不安が解消される」のはどんな瞬間？",
    a: "必要な情報・データ・資料が揃って「抜け漏れがない」と確認できたとき",
    b: "「なぜそうなるのか」「どういう仕組みか」が自分の中で腑に落ちたとき",
    c: "「これでいい」という結論が出て、あとはやるだけという状態になったとき"
  },
  {
    title: "Q3. 「なぜそう思うの？」と突然聞かれたとき、あなたの反応は？",
    a: "「根拠となる事実やデータ」をまず挙げて説明し始める",
    b: "「AだからB、BだからC」という思考の流れを順番に説明する",
    c: "理由を説明するのが少し面倒、または「なんとなく」と感じる"
  },
  {
    title: "Q4. 自分の考えを誰かに説明するとき、その目的は主に？",
    a: "「自分の理解が正しいか確かめたい」「一緒に答えを探したい」",
    b: "「自分の結論を守りたい」「反論されないよう根拠を固めたい」",
    c: "「そもそも説明に興味がない」「わかってもらえればそれでいい」"
  },
  {
    title: "Q5. 誰かに仕事を頼むとき、あなたの伝え方は？",
    a: "「これをやっておいて」と成果物だけ伝えるシンプルな指示",
    b: "「まずAをして、次にBを確認して、その後Cを…」と手順を細かく説明する",
    c: "手順は細かく伝えるが、自分もよくわからないまま伝えていることが多い"
  },
  {
    title: "Q6. 話が噛み合わないとき、振り返ると自分が省いていたのは？",
    a: "「どういう判断をしたか」「なぜその順番なのか」という思考の経緯",
    b: "「そもそもこういう状況だった」という背景や前提となる事実",
    c: "省いているというより、伝えすぎて相手が混乱していることが多い"
  },
  {
    title: "Q7. ルールや事前情報を渡されたとき、あなたはどう扱う？",
    a: "できるだけ正確に把握しようとする。勘違いや見落としを嫌う",
    b: "自分の結論に都合の良い部分を重視し、不都合な部分はあまり気にしない",
    c: "細かいことより「早く動きたい」という気持ちが先に来る"
  },
  {
    title: "Q8. 同じ失敗を繰り返してしまうとき、その原因として思い当たるのは？",
    a: "確認不足・情報の見落とし・思い込みによる前提ミス",
    b: "「なぜそうなったか」の構造を理解しないまま次に進んでしまったこと",
    c: "そもそも何を目指していたかがぼんやりしていたこと"
  },
  {
    title: "Q9. 新しい業務を覚えるとき、一番「わかった」と感じるのは？",
    a: "必要な用語・書類・前提条件・過去の事例が頭に入ったとき",
    b: "「なぜこの手順なのか」「例外はどう判断するのか」の理屈が理解できたとき",
    c: "完成例や仕上がりイメージを見て「これを作ればいいんだ」とわかったとき"
  },
  {
    title: "Q10. 誰かの説明を聞いていて「もっとここを教えてほしい」と思うのは？",
    a: "「前提となる情報や背景」「根拠となるデータや事実」",
    b: "「なぜそうなるのかの理屈」「判断の基準や考え方」",
    c: "「最終的にどうなるのか」「自分が何をすればいいのか」"
  }
];

// 結果パターン定義
// ベクトル: IPO / OPI
// 注意配分: I / P / O
// 分解能: 大 / 小
// = 2 × 3 × 2 = 12パターン + OPI細分化

const patterns = {
  "IPO-I-大": {
    name: "精密ファクトアーキテクト",
    desc: "正確な情報を集め、そこから緻密な因果構造を組み立てていくタイプです。「根拠が揃っていない状態で動く」ことを本能的に嫌い、情報収集フェーズに他の人より時間をかけます。一方で、一度動き出すと精度と再現性が高く、後から問題が出にくいという特徴があります。\n\n思考の解像度が非常に高く、他の人が「まあこれくらいでいいか」と流す部分でも、細部の不整合に気づいてしまいます。会議でも「その前提はどこから来たのか」「その数字の出典は？」という問いを自然に持ちます。これは能力の高さである一方、周囲から「慎重すぎる」「話が進まない」と見られることもあります。\n\n情報収集とモデル化を同時進行できるのがこのタイプの真骨頂です。ただのファクト収集者ではなく、「集めた情報がどう繋がっているか」を常に意識しながら動いています。そのため、複雑な問題ほど力を発揮し、情報が少なく曖昧な状況ほど動きが鈍くなるという二面性があります。",
    strength: "情報の欠落や矛盾に対して鋭敏です。誰も気づかないデータのズレや、前提の穴を発見する能力が突出しています。根拠に基づいた構造設計が得意で、「なぜそうなるか」を丁寧に説明できるため、信頼性の高いアウトプットを出せます。また、過去の情報を体系的に蓄積・参照する習慣があるため、同じミスを繰り返しにくいという長所もあります。複雑な調査業務・分析業務・設計業務で本領を発揮します。",
    caution: "情報収集が完璧になるまで動けなくなるリスクがあります。「あと少しデータが揃えば」という感覚が続き、実行フェーズへの移行が遅れがちです。現実のビジネスや業務では「6〜7割の情報で動く」判断力も必要で、この点を意識的にトレーニングする価値があります。また、情報の正確さへのこだわりが強すぎると、感覚で動く必要がある場面や、スピードが求められる場面でストレスを感じやすくなります。「今必要な精度はどのくらいか」を場面ごとに判断する習慣をつけると、活動範囲が広がります。"
  },
  "IPO-I-小": {
    name: "慎重派スタンダード型",
    desc: "事実やデータを正確に把握することを優先しますが、細かく掘り下げるよりも「情報が揃っているかどうか」の確認に注意が向きます。マニュアルや規則をベースに、安定したペースで動くタイプです。急かされることを嫌い、自分のリズムで着実に進めることが得意です。\n\n新しい業務や場面に直面したとき、まず「前例はあるか」「ルールはどうなっているか」を確認する傾向があります。既存の枠組みの中では高いパフォーマンスを発揮しますが、前例がない状況では判断が止まりやすいという特徴があります。\n\n信頼性と安定感が武器です。「あの人に任せれば間違いない」と思われやすく、組織の中で安心感を与える存在になりやすいタイプです。",
    strength: "正確さと安定性が際立っています。既存のルールや枠組みの中で確実に成果を出す能力が高く、ミスが少ない。また、情報を正確に受け取り・伝える能力が高いため、連絡・報告・記録といった業務で信頼されやすいです。コツコツと積み上げる仕事を継続できる忍耐力も持ち合わせています。組織の中では「安定した基盤」として機能する存在です。",
    caution: "想定外の状況や前例のないケースで判断が止まりやすい傾向があります。「これはルールにないから判断できない」という状態になりやすく、自分で判断基準を設計する経験が少ないと感じることもあるでしょう。判断基準を自分で作る練習や、「この状況ではどう考えるか」を積極的に言語化する習慣が、キャリアの幅を広げます。また、慎重さゆえにスピードが求められる場面でストレスを感じやすいので、「この判断は後で修正できるか」という視点を持つと動きやすくなります。"
  },
  "IPO-P-大": {
    name: "高解像度システムアーキテクト",
    desc: "物事の「仕組み」「因果関係」そのものに強い関心を持ち、思考プロセスを異常な粒度で分解して見るタイプです。「なぜそうなるか」が言語化できない状態を不快に感じ、構造が見えるまで考え続けます。一般的な「論理的思考ができる人」とは別次元で、思考の多段構造を自然に扱います。\n\n「勉強 → テスト」と見ている人が多い中で、「勉強 → 理解 → 整理 → 抽象化 → 比較 → 再構成 → 応用 → テスト」と見えてしまうタイプです。この細かさは周囲から「考えすぎ」「説明が長い」と受け取られることがありますが、それはこのタイプの認知解像度が他の人より単純に高いことの表れです。\n\n業務設計・教育設計・AI活用・組織運営など「仕組みを作る仕事」で圧倒的な強みを発揮します。成果物よりも「成果物が生まれる仕組み」への関心が強く、完成品に対する執着は薄めです。",
    strength: "複雑な問題を構造化・モデル化する能力が突出しています。他の人が「なんとなくうまくいった」と感じる事柄を、再現可能な仕組みとして設計できます。業務マニュアル・教育プログラム・システム設計など、ゼロから枠組みを作る作業で本領を発揮します。また、「少し考えれば分かるはず」という感覚が強いため、問題の本質を素早く見抜く直感も持っています。AI・認知科学・学習設計など、構造を扱う分野との相性が非常に高いです。",
    caution: "分解が止まらず、アウトプットが遅れるリスクがあります。「もう少し整理してから」「もう一段深く考えてから」という感覚が続き、完成品より設計に時間をかけすぎることがあります。また、自分にとって自明に見えることが他者には見えていない場面が多く、「なぜわからないのか」という違和感を持ちやすいです。これは能力差ではなく思考の解像度の差であることを意識すると、他者とのコミュニケーションが改善します。「このくらいの精度で十分」という判断基準を意識的に設けることが重要です。"

// 選択肢をシャッフルして各問に付与
const shuffledQuestions = questions.map(q => {
  const choices = [
    { key: 'a', text: q.a },
    { key: 'b', text: q.b },
    { key: 'c', text: q.c }
  ];
  // Fisher-Yates shuffle
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  return { title: q.title, choices };
});

let currentQuestion = 0;
const answers = []; // 各問の元キー（a/b/c）を記録

// 質問生成
const container = document.getElementById('questions-container');
shuffledQuestions.forEach((q, i) => {
  const box = document.createElement('div');
  box.className = `question-box${i === 0 ? ' active' : ''}`;
  box.id = `q-${i}`;
  const choiceBtns = q.choices.map((c, ci) =>
    `<button class="choice-btn" id="btn-${i}-${ci}" onclick="nextQuestion('${c.key}', ${ci}, ${i})">
      <span class="choice-label">${String.fromCharCode(65 + ci)}</span>
      <span>${c.text}</span>
    </button>`
  ).join('');
  const backBtn = i > 0
    ? `<button class="back-btn" onclick="prevQuestion(${i})">← 前の問いに戻る</button>`
    : '';
  box.innerHTML = `
    <div class="q-title">${q.title}</div>
    <div class="btn-list">${choiceBtns}</div>
    ${backBtn}
  `;
  container.appendChild(box);
});

function updateProgress(idx) {
  const pct = Math.round(((idx + 1) / shuffledQuestions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').innerText = `${idx + 1} / ${shuffledQuestions.length}`;
}

function highlightSelected(qIdx) {
  if (answers[qIdx] === undefined) return;
  const q = shuffledQuestions[qIdx];
  q.choices.forEach((c, ci) => {
    const btn = document.getElementById(`btn-${qIdx}-${ci}`);
    if (btn) btn.classList.toggle('selected', c.key === answers[qIdx]);
  });
}

function nextQuestion(key, choiceIdx, qIdx) {
  answers[qIdx] = key;
  highlightSelected(qIdx);
  document.getElementById(`q-${qIdx}`).classList.remove('active');
  currentQuestion = qIdx + 1;
  if (currentQuestion < shuffledQuestions.length) {
    document.getElementById(`q-${currentQuestion}`).classList.add('active');
    updateProgress(currentQuestion);
    highlightSelected(currentQuestion);
  } else {
    showResult();
  }
}

function prevQuestion(qIdx) {
  document.getElementById(`q-${qIdx}`).classList.remove('active');
  currentQuestion = qIdx - 1;
  document.getElementById(`q-${currentQuestion}`).classList.add('active');
  updateProgress(currentQuestion);
  highlightSelected(currentQuestion);
}

function showResult() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';

  // ベクトル判定（Q1,Q3,Q4,Q7）
  let opiScore = 0;
  if (answers[0] === 'c') opiScore++;
  if (answers[2] === 'c') opiScore++;
  if (answers[3] === 'b') opiScore++;
  if (answers[6] === 'b') opiScore++;
  // OPIはスコア2以上で確定、3以上で強OPI
  const isOPI = opiScore >= 2;
  const vectorLabel = isOPI ? "OPI型" : "IPO型";
  const vectorKey = isOPI ? "OPI" : "IPO";

  // 注意配分 W（Q2,Q8,Q9,Q10）
  let cI = 0, cP = 0, cO = 0;
  [1, 7, 8, 9].forEach(idx => {
    if (answers[idx] === 'a') cI++;
    if (answers[idx] === 'b') cP++;
    if (answers[idx] === 'c') cO++;
  });
  let weightKey = null;
  let weightLabel = "複合型";
  if (cP > cI && cP > cO) { weightKey = "P"; weightLabel = "P中心型"; }
  else if (cI > cP && cI > cO) { weightKey = "I"; weightLabel = "I極振り型"; }
  else if (cO > cI && cO > cP) { weightKey = "O"; weightLabel = "O極振り型"; }
  // 同点の場合はweightKey=nullのまま → 複合型ロジックへ

  // 分解能 n（Q5,Q6）
  const highN = (answers[4] === 'b' || answers[5] === 'a');
  const resKey = highN ? "大" : "小";
  const resLabel = highN ? "分解能：大" : "分解能：小";

  // パターンキー生成（weightKeyがnull=同点の場合は複合型ロジックへ直行）
  const key = weightKey ? `${vectorKey}-${weightKey}-${resKey}` : null;
  let pattern = key ? patterns[key] : null;

  // 複合型：W判定が同点の場合など明確なキーが出なかったとき
  if (!pattern) {
    // どの軸が同点になっているか判定
    const wTied = (cI === cP && cI > cO) ? "IP" :
                  (cI === cO && cI > cP) ? "IO" :
                  (cP === cO && cP > cI) ? "PO" :
                  (cI === cP && cP === cO) ? "IPO" : null;

    const baseVector = isOPI ? "直感・ビジョン起点" : "情報・構造起点";
    const nDesc = highN ? "思考の分解能は高く、物事を細かいステップで捉えます" : "思考はシンプルにまとまる傾向があります";

    if (wTied === "IP") {
      pattern = {
        name: isOPI ? "探究型クリエイター" : "分析探究型",
        desc: `情報の正確さと仕組みへの理解を同時に重視する、知的好奇心の強いタイプです。${baseVector}で動きながら、「根拠が揃っているか」と「なぜそうなるか」の両方に注意が向きます。どちらか一方に絞れない分、深く理解してから動くという特徴があります。\n\n${nDesc}。情報を集めながら構造を考えるという並列処理が自然にできるため、調査・分析・設計を一人でこなす場面で力を発揮します。\n\n「わかってから動く」タイプのため、スピードより精度を優先します。結果よりも「どうやって解くか」に関心が向きやすく、問題の本質を掴む力があります。`,
        strength: "情報収集と構造化思考を同時に走らせられる点が強みです。「根拠が揃っていてかつ仕組みが理解できている」状態を作ってから動くため、後から問題が出にくいアウトプットを生みます。調査設計・業務分析・ドキュメント作成など、正確さと論理性が求められる仕事で本領を発揮します。",
        caution: "情報収集と構造理解の両方を満たすまで動けなくなるリスクがあります。「情報が揃っていて、かつ仕組みも理解できた」状態を求めすぎると、実行フェーズへの移行が大幅に遅れることがあります。「今回はどちらを優先するか」を場面ごとに判断する習慣が有効です。"
      };
    } else if (wTied === "PO") {
      pattern = {
        name: isOPI ? "ビジョン駆動型リーダー" : "目標設計型リーダー",
        desc: `「なぜそうなるか」を理解しながら「最終的にどうなるか」にコミットするタイプです。${baseVector}で動きながら、仕組みと成果の両方に関心を持ちます。プロセスを理解しながらゴールを明確に持てる、マネジメント適性の高いパターンです。\n\n${nDesc}。「どうすれば目標を達成できるか」を自然に考えながら、手段の妥当性も検証します。説明力と推進力を兼ね備えています。\n\n結果を出すために仕組みを使う、という発想が自然にできるため、業務改善・組織運営・プロジェクト管理との相性が高いです。`,
        strength: "仕組みを理解しながら成果を追えるため、「なんとなくうまくいった」ではなく再現性のある成果を出せます。チームへの説明と成果へのコミットを同時にできるため、リーダーや推進役として機能しやすいです。",
        caution: "仕組みと成果の両方にこだわるため、情報の正確さ（根拠・前提）を後回しにするリスクがあります。「この判断の前提は正しいか」を確認する習慣が、判断精度をさらに高めます。"
      };
    } else if (wTied === "IO") {
      pattern = {
        name: isOPI ? "完全武装型実行者" : "根拠重視型実行者",
        desc: `情報の正確さと最終的な成果の両方を重視するタイプです。${baseVector}で動きながら、「根拠が揃っているか」と「ゴールに向かっているか」を同時に確認します。仕組みよりも「事実」と「結果」にフォーカスする現実志向のパターンです。\n\n${nDesc}。「根拠のある成果」を求めるため、精度と速度を両立しようとしますが、場合によってはどちらかを犠牲にする判断が必要になります。\n\n実務的な強さがあり、「確認してから動く、動いたら結果を出す」という流れが自然にできます。`,
        strength: "根拠を持ちながら成果にコミットできる実務的な強さがあります。「なんとなく」で動かず、かつ議論に終始しないため、確実に前進できます。データや事実を大切にしながらも、結果を出すことへの意識が高いです。",
        caution: "仕組みや因果への関心が薄いため、同じ問題が形を変えて再発しやすいリスクがあります。「なぜこの結果になったか」を一段深く掘り下げる習慣が、問題の根本解決につながります。"
      };
    } else {
      // IPO全部同点 = 真の複合型
      pattern = {
        name: isOPI ? "万能型カメレオン（直感起点）" : "万能型カメレオン",
        desc: `情報・仕組み・成果のすべてに均等に注意が向く、極めて稀な複合型です。${baseVector}で動きながら、状況に応じて関心の重心を柔軟に移動させます。特定の型に縛られず、相手や場面によって最適なアプローチを選べます。\n\n${nDesc}。どの側面も均等に意識できるため、チームの中でさまざまなタイプの人間と自然に連携できます。\n\nただし、「自分のデフォルトがどこにあるか」が見えにくいため、ストレス下や疲労時に判断の軸がブレやすいという特徴があります。`,
        strength: "状況適応力が際立っています。I型・P型・O型すべての視点を使い分けられるため、チームの橋渡し役や、複数の役割を同時にこなす場面で唯一無二の強みを発揮します。また、相手のタイプに合わせたコミュニケーションが自然にできるため、人間関係の摩擦が少ないです。",
        caution: "「自分の軸はどこか」が見えにくいため、疲労やストレス時に判断の一貫性が崩れやすいです。自分が最もエネルギーを感じるのはどの場面か、何に最も違和感を感じるかを記録しておくと、自分のデフォルトモードが見えてきます。それが本来の強みの核になります。"
      };
    }
  }

  document.getElementById('res-type-name').innerText = pattern.name;
  document.getElementById('res-description').innerText = pattern.desc;
  document.getElementById('res-strength').innerText = pattern.strength;
  document.getElementById('res-caution').innerText = pattern.caution;

  document.getElementById('badge-vector').innerText = vectorLabel;
  document.getElementById('badge-weight').innerText = weightLabel;
  document.getElementById('badge-res').innerText = resLabel;

  document.getElementById('dbg-vector').innerText = vectorLabel;
  document.getElementById('dbg-weight').innerText = weightLabel;
  document.getElementById('dbg-res').innerText = resLabel;
  document.getElementById('dbg-opi').innerText = `${opiScore} / 4`;

  // IPOスコアバー（W判定の4問 = 最大4点）
  const maxScore = 4;
  setTimeout(() => {
    document.getElementById('bar-i').style.width = `${(cI / maxScore) * 100}%`;
    document.getElementById('bar-p').style.width = `${(cP / maxScore) * 100}%`;
    document.getElementById('bar-o').style.width = `${(cO / maxScore) * 100}%`;
  }, 100);
  document.getElementById('num-i').innerText = `${cI} / ${maxScore}`;
  document.getElementById('num-p').innerText = `${cP} / ${maxScore}`;
  document.getElementById('num-o').innerText = `${cO} / ${maxScore}`;
}
</script>
</body>
</html>
